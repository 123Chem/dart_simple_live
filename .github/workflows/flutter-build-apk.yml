# 工作流名称（在 GitHub Actions 面板显示）
name: Build Flutter APK

# 触发条件：当推送到 main 分支、或创建 Pull Request 到 main 分支时执行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 定义执行的任务
jobs:
  build-apk:
    # 运行环境：选择 Ubuntu 最新版（Flutter 构建推荐 Linux 环境）
    runs-on: ubuntu-latest

    # 任务步骤
    steps:
      # 步骤 1：检出仓库代码（让 Actions 能访问你的项目代码）
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2：配置 Java 环境（Android 构建依赖 Java 17+）
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # 推荐的 OpenJDK 发行版
          cache: gradle # 缓存 Gradle 依赖，加速构建

      # 步骤 3：安装 Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2 # 官方推荐的 Flutter 安装 Action
        with:
          flutter-version: 'stable' # 使用 Flutter 稳定版（也可指定具体版本，如 3.16.0）
          cache: true # 缓存 Flutter 依赖，加速后续构建

      # 步骤 4：接受 Android SDK 许可证（避免构建时因许可证未同意失败）
      - name: Accept Android licenses
        run: |
          echo "y" | flutter doctor --android-licenses

      # 步骤 5：安装 Flutter 项目依赖（pub get）
      - name: Install dependencies
        run: flutter pub get

      # 步骤 6：检查项目（可选，提前发现构建问题）
      - name: Flutter doctor
        run: flutter doctor -v

      # 步骤 7：构建 Release 版 APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons
        # 可选参数说明：
        # --release：生成正式版 APK（去掉则是 debug 版）
        # --no-tree-shake-icons：避免图标摇树优化导致的异常（按需取舍）

      # 步骤 8：上传 APK 作为构建产物（方便你下载）
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          # 产物名称（下载时显示）
          name: app-release-apk
          # APK 生成路径（Flutter 构建后默认路径）
          path: build/app/outputs/flutter-apk/app-release.apk
