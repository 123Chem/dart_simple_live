# 工作流名称（在 GitHub Actions 面板显示）
name: Build Flutter APK

# 触发条件：1.推送到master分支 2.手动触发（优先用手动）
on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

# 定义执行的任务
jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置Java环境
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 步骤3：安装Flutter SDK（指定具体版本，解决版本检测失败）
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # 替换为具体稳定版号，避免版本检测报错
          flutter-version: '3.22.0'  
          cache: true

      # 步骤4：手动更新Flutter并检查版本（兜底，确保SDK可用）
      - name: Upgrade Flutter & check version
        run: |
          flutter upgrade
          flutter --version

      # 步骤5：接受Android SDK许可证
      - name: Accept Android licenses
        run: echo "y" | flutter doctor --android-licenses

      # 步骤6：安装项目依赖
      - name: Install Flutter dependencies
        run: flutter pub get

      # 步骤7：构建Release版APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # 步骤8：上传APK产物
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dart-simple-live-apk
          path: build/app/outputs/flutter-apk/app-release.apk
